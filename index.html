&lt;style&gt;
:root{
  --bg:#f7fbff;--card:#fff;--ink:#172033;--muted:#64748b;
  --blue:#2563eb;--green:#16a34a;--orange:#f97316;--red:#dc2626;
  --purple:#7c3aed;--line:#dbeafe;--soft:#eff6ff;--yellow:#fef3c7;
}
*{box-sizing:border-box}
body{margin:0;font-family:&quot;Segoe UI&quot;,system-ui,-apple-system,BlinkMacSystemFont,&quot;Helvetica Neue&quot;,Arial,sans-serif;background:linear-gradient(180deg,#f8fbff,#edf6ff);color:var(--ink)}
header{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.95);border-bottom:1px solid var(--line);backdrop-filter:blur(10px);padding:14px 20px}
h1{margin:0;font-size:24px;color:#0f172a}
.subtitle{margin-top:5px;color:var(--muted);font-size:14px}
nav{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
nav button{border:1px solid #bfdbfe;background:#eff6ff;color:#1d4ed8;padding:8px 12px;border-radius:999px;cursor:pointer;font-weight:800}
nav button.active{background:#2563eb;color:white}
main{max-width:1180px;margin:auto;padding:20px}
section{display:none;background:rgba(255,255,255,.85);border:1px solid var(--line);border-radius:24px;padding:22px;box-shadow:0 12px 30px rgba(37,99,235,.08);margin-bottom:24px}
section.active{display:block}
h2{margin:0 0 10px;font-size:24px;color:#111827}
h3{margin:18px 0 10px;color:#1e3a8a}
.ruleBox,.teacherNote{border:1px solid #bfdbfe;background:#f8fbff;border-radius:18px;padding:14px 16px;margin:12px 0 18px;line-height:1.65}
.teacherNote{background:#ecfeff;border-color:#a5f3fc;color:#155e75}
.ruleBox strong{color:#1d4ed8}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px}
.wordCard{background:white;border:1px solid var(--line);border-radius:16px;padding:12px;min-height:118px;box-shadow:0 5px 14px rgba(15,23,42,.055);display:flex;flex-direction:column;justify-content:space-between;gap:6px}
.word{font-size:28px;font-weight:900;letter-spacing:.3px}
.hint,.small{font-size:13px;color:#64748b}
.badge{display:inline-block;padding:3px 8px;border-radius:999px;font-size:12px;font-weight:900;margin-top:2px}
.short{background:#fee2e2;color:#991b1b}
.long{background:#dcfce7;color:#166534}
.btn{border:none;background:#2563eb;color:white;padding:8px 12px;border-radius:12px;cursor:pointer;font-weight:900;box-shadow:0 4px 10px rgba(37,99,235,.16)}
.btn.secondary{background:#f8fafc;color:#0f172a;border:1px solid #cbd5e1;box-shadow:none}
.btn.green{background:#16a34a}.btn.orange{background:#f97316}.btn.red{background:#dc2626}.btn.purple{background:#7c3aed}
.btn:disabled{opacity:.45;cursor:not-allowed}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.score{display:inline-flex;align-items:center;gap:8px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:8px 12px;margin:8px 0;font-weight:900}
.progressBar{height:12px;background:#e2e8f0;border-radius:999px;overflow:hidden;margin:8px 0 4px}
.progressFill{height:100%;width:0;background:#2563eb;transition:.25s}
.listenPanel{background:#fff7ed;border:1px solid #fed7aa;border-radius:20px;padding:18px;margin:14px 0}
.pairBox{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;margin-top:14px}
.pairOption{background:white;border:3px solid #dbeafe;border-radius:22px;padding:24px 18px;font-size:34px;font-weight:950;cursor:pointer;text-align:center;transition:.16s}
.pairOption:hover{border-color:#2563eb;transform:translateY(-2px)}
.pairOption.correct{background:#dcfce7;border-color:#16a34a;color:#166534}
.pairOption.wrong{background:#fee2e2;border-color:#dc2626;color:#991b1b}
.vs{font-size:20px;font-weight:950;color:#64748b;text-align:center}
.feedback{min-height:40px;margin-top:12px;font-size:18px;font-weight:900;line-height:1.5}
.feedback.good{color:#16a34a}.feedback.bad{color:#dc2626}
.targetBar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:#f8fafc;border:1px solid #e2e8f0;border-radius:18px;padding:14px;margin-top:12px}
.gameArea{position:relative;height:420px;background:linear-gradient(180deg,#dbeafe 0%,#f8fafc 72%,#dcfce7 100%);border:2px solid #bfdbfe;border-radius:22px;overflow:hidden;margin-top:14px;contain:layout paint size}
.fallWord{position:absolute;top:0;left:0;min-width:102px;text-align:center;padding:12px 14px;border-radius:18px;background:white;border:2px solid #93c5fd;box-shadow:0 4px 10px rgba(30,64,175,.12);font-size:24px;font-weight:950;cursor:pointer;will-change:transform;user-select:none}
.fallWord:hover{background:#eff6ff;border-color:#2563eb}
.spellWrap{display:grid;grid-template-columns:minmax(280px,1fr) minmax(320px,1.1fr);gap:18px;align-items:start}
@media(max-width:850px){.spellWrap{grid-template-columns:1fr}.pairBox{grid-template-columns:1fr}.vs{display:none}h1{font-size:20px}}
.pictureBox{background:#fff;border:1px solid var(--line);border-radius:22px;min-height:300px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow:hidden}
.bigEmoji{font-size:92px;animation:bounce 1.4s infinite ease-in-out}
@keyframes bounce{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-14px) scale(1.05)}}
.soundWave{display:flex;gap:5px;height:40px;align-items:end;margin-top:16px}
.bar{width:7px;background:#2563eb;border-radius:10px;animation:wave .9s infinite ease-in-out}
.bar:nth-child(2){animation-delay:.1s}.bar:nth-child(3){animation-delay:.2s}.bar:nth-child(4){animation-delay:.3s}.bar:nth-child(5){animation-delay:.4s}
@keyframes wave{0%,100%{height:10px}50%{height:36px}}
input[type=text]{width:100%;border:2px solid #bfdbfe;border-radius:14px;padding:13px 14px;font-size:24px;font-weight:900;letter-spacing:1px}
canvas{width:100%;height:190px;background:white;border:2px dashed #93c5fd;border-radius:18px;touch-action:none;cursor:crosshair}

.hwBoxes{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  padding:12px;
  background:#f8fafc;
  border:1px solid #dbeafe;
  border-radius:18px;
  margin:10px 0 12px;
}
.letterBox{
  width:116px;
  background:#ffffff;
  border:1px solid #bfdbfe;
  border-radius:16px;
  padding:8px;
  text-align:center;
  box-shadow:0 4px 10px rgba(37,99,235,.08);
}
.letterIndex{
  font-size:12px;
  color:#64748b;
  margin-bottom:5px;
  font-weight:800;
}
canvas.hwCanvas{
  width:96px;
  height:116px;
  border:2px dashed #93c5fd;
  border-radius:12px;
  background:#ffffff;
  touch-action:none;
  cursor:crosshair;
}
.recognizedStrip{
  background:#fff7ed;
  border:1px solid #fed7aa;
  border-radius:14px;
  padding:10px;
  margin:8px 0;
  font-size:18px;
  font-weight:900;
}

.explain{background:#f8fafc;border-left:5px solid #2563eb;border-radius:12px;padding:12px;margin-top:10px;line-height:1.6}
.pill{display:inline-block;padding:5px 9px;border-radius:999px;background:#eff6ff;border:1px solid #bfdbfe;font-weight:900;color:#1d4ed8;margin:3px}
.confetti{position:fixed;top:-20px;width:10px;height:10px;background:#2563eb;animation:confetti 1.5s linear forwards;z-index:99}
@keyframes confetti{to{transform:translateY(110vh) rotate(720deg);opacity:0}}

&lt;section id=&quot;part1&quot; class=&quot;active&quot;&gt;

  &lt;div class=&quot;ruleBox&quot;&gt;
    &lt;p&gt;&lt;strong&gt;Rule A｜No silent e：短元音&lt;/strong&gt;：没有词尾不发音 e，元音通常读短音。例：&lt;b&gt;cap, cut, pin&lt;/b&gt;&lt;/p&gt;
    &lt;p&gt;&lt;strong&gt;Rule B｜Magic e：长元音&lt;/strong&gt;：词尾 e 不发音，让前面的元音读&ldquo;字母名&rdquo;。例：&lt;b&gt;cape, cute, pine&lt;/b&gt;&lt;/p&gt;
    &lt;p class=&quot;small&quot;&gt;点击 🔊 后跟读。系统会优先选择设备里的温柔清晰英语女声；若设备没有女声，会自动使用可用英语声音。&lt;/p&gt;

/* ===================== UTILS ===================== */
function $(id){return document.getElementById(id)}
function norm(s){return (s||&quot;&quot;).trim().toLowerCase()}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i&gt;0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function wordObj(w){
  const all = [...shortWords, ...longWords];
  const item = all.find(x=&gt;norm(x.word)===norm(w));
  if(item) return item;
  const lower = norm(w);
  const isLong = lower.endsWith(&quot;e&quot;) &amp;&amp; lower.length&gt;2;
  const vowel = (lower.match(/[aeiou]/)||[&quot;&quot;])[0];
  return {word:w,vowel,rule:isLong?&quot;long&quot;:&quot;short&quot;,cn:isLong ? &quot;词尾 e 不发音，前面元音读长音&quot; : &quot;没有 silent e，元音读短音&quot;};
}
function ruleExplain(item){
  if(item.rule===&quot;long&quot;) return `${item.word}: 词尾 e 不发音，它让前面的 ${item.vowel.toUpperCase()} 读长音 / 字母名。`;
  return `${item.word}: 没有词尾 silent e，中间的 ${item.vowel.toUpperCase()} 读短音。`;
}
function insertAfterTwo(queue,item){queue.splice(Math.min(2,queue.length),0,item)}
function makeConfetti(){
  const colors=[&quot;#2563eb&quot;,&quot;#16a34a&quot;,&quot;#f97316&quot;,&quot;#7c3aed&quot;,&quot;#dc2626&quot;,&quot;#facc15&quot;];
  for(let i=0;i&lt;28;i++){
    const el=document.createElement(&quot;div&quot;);el.className=&quot;confetti&quot;;
    el.style.left=Math.random()*100+&quot;vw&quot;;el.style.background=colors[Math.floor(Math.random()*colors.length)];
    el.style.animationDuration=(1.1+Math.random()*1.2)+&quot;s&quot;;document.body.appendChild(el);
    setTimeout(()=&gt;el.remove(),2400);
  }
}

/* ===================== TTS：优先温柔清晰女声 ===================== */
let voices=[];
function loadVoices(){voices = window.speechSynthesis ? speechSynthesis.getVoices() : []}
if(&quot;speechSynthesis&quot; in window){loadVoices(); speechSynthesis.onvoiceschanged=loadVoices}
function pickGentleFemaleEnglishVoice(){
  if(!voices.length) return null;
  const en = voices.filter(v =&gt; /^en[-_]/i.test(v.lang || &quot;&quot;));
  const femaleHints = [&quot;Jenny&quot;,&quot;Aria&quot;,&quot;Samantha&quot;,&quot;Susan&quot;,&quot;Zira&quot;,&quot;Hazel&quot;,&quot;Google UK English Female&quot;,&quot;Google US English&quot;,&quot;Microsoft Aria&quot;,&quot;Microsoft Jenny&quot;,&quot;Microsoft Zira&quot;];
  for(const hint of femaleHints){
    const v = en.find(x =&gt; (x.name||&quot;&quot;).toLowerCase().includes(hint.toLowerCase()));
    if(v) return v;
  }
  const natural = en.find(v =&gt; /natural|online|neural|premium/i.test(v.name||&quot;&quot;));
  return natural || en[0] || voices[0];
}
function speak(text, lang=&quot;en-US&quot;, rate=.62, pitch=1.12){
  if(!(&quot;speechSynthesis&quot; in window)){alert(&quot;This browser does not support speech synthesis.&quot;);return}
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang=lang;u.rate=rate;u.pitch=pitch;u.volume=1;
  const v = lang.startsWith(&quot;en&quot;) ? pickGentleFemaleEnglishVoice() : voices.find(x=&gt;/^zh/i.test(x.lang||&quot;&quot;));
  if(v) u.voice=v;
  speechSynthesis.speak(u);
}

function setupLetterCanvas(canvas){
  const ctx=canvas.getContext(&quot;2d&quot;);
  ctx.lineWidth=8;
  ctx.lineCap=&quot;round&quot;;
  ctx.lineJoin=&quot;round&quot;;
  ctx.strokeStyle=&quot;#0f172a&quot;;
  let drawing=false;
  function pos(e){
    const r=canvas.getBoundingClientRect();
    const p=e.touches?e.touches[0]:e;
    return {
      x:(p.clientX-r.left)*(canvas.width/r.width),
      y:(p.clientY-r.top)*(canvas.height/r.height)
    };
  }
  function down(e){
    drawing=true;
    const p=pos(e);
    ctx.beginPath();
    ctx.moveTo(p.x,p.y);
    e.preventDefault();
  }
  function move(e){
    if(!drawing)return;
    const p=pos(e);
    ctx.lineTo(p.x,p.y);
    ctx.stroke();
    e.preventDefault();
  }
  function up(){drawing=false;}
  canvas.addEventListener(&quot;mousedown&quot;,down);
  canvas.addEventListener(&quot;mousemove&quot;,move);
  window.addEventListener(&quot;mouseup&quot;,up);
  canvas.addEventListener(&quot;touchstart&quot;,down,{passive:false});
  canvas.addEventListener(&quot;touchmove&quot;,move,{passive:false});
  canvas.addEventListener(&quot;touchend&quot;,up);
  canvas.addEventListener(&quot;dblclick&quot;,()=&gt;clearOneCanvas(canvas));
}

/* ---------- Local template-based handwriting recognizer ---------- */

function normalizeCanvasToGrid(sourceCanvas, size=28){
  const srcCtx=sourceCanvas.getContext(&quot;2d&quot;);
  const w=sourceCanvas.width, h=sourceCanvas.height;
  const img=srcCtx.getImageData(0,0,w,h);
  let minX=w, minY=h, maxX=-1, maxY=-1, count=0;
  for(let y=0;y&lt;h;y++){
    for(let x=0;x&lt;w;x++){
      const idx=(y*w+x)*4;
      const a=img.data[idx+3];
      const r=img.data[idx], g=img.data[idx+1], b=img.data[idx+2];
      const dark = a&gt;20 &amp;&amp; (r+g+b)&lt;700;
      if(dark){
        count++;
        if(x&lt;minX)minX=x;if(x&gt;maxX)maxX=x;if(y&lt;minY)minY=y;if(y&gt;maxY)maxY=y;
      }
    }
  }
  if(count&lt;18) return null;
  const pad=8;
  minX=Math.max(0,minX-pad);minY=Math.max(0,minY-pad);
  maxX=Math.min(w-1,maxX+pad);maxY=Math.min(h-1,maxY+pad);
  const bw=maxX-minX+1,bh=maxY-minY+1;
  const tmp=document.createElement(&quot;canvas&quot;);
  tmp.width=size;tmp.height=size;
  const tctx=tmp.getContext(&quot;2d&quot;);
  tctx.fillStyle=&quot;white&quot;;tctx.fillRect(0,0,size,size);
  const scale=Math.min((size-4)/bw,(size-4)/bh);
  const dw=bw*scale, dh=bh*scale;
  const dx=(size-dw)/2, dy=(size-dh)/2;
  tctx.drawImage(sourceCanvas,minX,minY,bw,bh,dx,dy,dw,dh);
  const out=tctx.getImageData(0,0,size,size).data;
  const arr=new Float32Array(size*size);
  for(let i=0;i&lt;arr.length;i++){
    const r=out[i*4],g=out[i*4+1],b=out[i*4+2],a=out[i*4+3];
    const darkness = a ? (255-((r+g+b)/3))/255 : 0;
    arr[i]=darkness&gt;0.18 ? 1 : 0;
  }
  return arr;
}

function renderLetterTemplate(letter, font, upper=false, size=28){
  const c=document.createElement(&quot;canvas&quot;);
  c.width=120;c.height=145;
  const ctx=c.getContext(&quot;2d&quot;);
  ctx.fillStyle=&quot;white&quot;;ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle=&quot;#0f172a&quot;;
  ctx.textAlign=&quot;center&quot;;
  ctx.textBaseline=&quot;middle&quot;;
  ctx.font=`112px ${font}`;
  const text=upper ? letter.toUpperCase() : letter;
  ctx.fillText(text,60,76);
  return normalizeCanvasToGrid(c,size);
}

function buildTemplates(){
  const fonts=[&quot;Arial&quot;,&quot;Verdana&quot;,&quot;Comic Sans MS&quot;,&quot;Trebuchet MS&quot;,&quot;Georgia&quot;];
  const templates={};
  for(const letter of hwLetters){
    templates[letter]=[];
    for(const font of fonts){
      const lower=renderLetterTemplate(letter,font,false);
      if(lower)templates[letter].push(lower);
      const upper=renderLetterTemplate(letter,font,true);
      if(upper)templates[letter].push(upper);
    }
  }
  return templates;
}

function jaccardDistance(a,b){
  let inter=0, union=0, diff=0;
  for(let i=0;i&lt;a.length;i++){
    const A=a[i]&gt;0.5, B=b[i]&gt;0.5;
    if(A||B)union++;
    if(A&amp;&amp;B)inter++;
    if(A!==B)diff++;
  }
  const jac = union ? 1 - inter/union : 1;
  return jac*0.75 + (diff/a.length)*0.25;
}

function recognizeLetter(canvas){
  if(!hwTemplates) hwTemplates=buildTemplates();
  const data=normalizeCanvasToGrid(canvas);
  if(!data) return {letter:&quot;&quot;,score:999};
  let best={letter:&quot;&quot;,score:999}, second={letter:&quot;&quot;,score:999};
  for(const letter of Object.keys(hwTemplates)){
    for(const tpl of hwTemplates[letter]){
      const d=jaccardDistance(data,tpl);
      if(d&lt;best.score){second=best;best={letter,score:d};}
      else if(d&lt;second.score){second={letter,score:d};}
    }
  }
  return best;
}

function recognizeHandwritingWord(){
  if(!spellCurrent){
    $(&quot;handwritingStatus&quot;).textContent=&quot;请先点击&ldquo;开始听写&rdquo;。&quot;;
    return;
  }
  const letters=[];
  const lowConfidence=[];
  for(let i=0;i&lt;hwCanvases.length;i++){
    const result=recognizeLetter(hwCanvases[i]);
    letters.push(result.letter || &quot;?&quot;);
    if(!result.letter || result.score&gt;0.78) lowConfidence.push(i+1);
  }
  const recognized=letters.join(&quot;&quot;);
  $(&quot;recognizedWord&quot;).textContent=recognized;
  $(&quot;spellInput&quot;).value=recognized.replace(/\?/g,&quot;&quot;);
  if(lowConfidence.length){
    $(&quot;handwritingStatus&quot;).textContent=`已识别为 ${recognized}。第 ${lowConfidence.join(&quot;, &quot;)} 格不太清楚，可以重写该格，双击格子可清空单格。`;
  }else{
    $(&quot;handwritingStatus&quot;).textContent=`已识别为 ${recognized}。`;
  }
  checkSpell(true);
}

$(&quot;recognizeInk&quot;).onclick=recognizeHandwritingWord;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**

     */
    function trackLogoClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)

        window.frog.add({
          url: '/click/HtmlPage/logo',
          eventId: 42816,
          customExtend: {
            chat_id: chatId,
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'logo'
        })

        console.log('[埋点] 点击飞象老师 Logo')
      }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'
        })
        console.log('[埋点] 点击立即体验')
      }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>
</body>

</html>
